<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Navbar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: #f4f2ef;
            padding: 2rem;
        }

        .nav {
            background: #2c3e50;
            padding: 0.8rem 2rem;
            border-radius: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            box-shadow: 0 8px 20px rgba(44, 62, 80, 0.2);
            max-width: 1100px;
            margin: 0 auto;
        }

        .nav-brand {
            font-size: 1.6rem;
            font-weight: 700;
            color: #ecf0f1;
            letter-spacing: -0.5px;
            text-decoration: none;
        }

        .nav-brand span {
            color: #f1c40f;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .nav-links a {
            text-decoration: none;
            color: #ecf0f1;
            font-weight: 500;
            font-size: 1rem;
            padding: 0.4rem 0.2rem;
            border-bottom: 2px solid transparent;
            transition: 0.25s ease;
        }

        .nav-links a:hover {
            color: #f1c40f;
            border-bottom-color: #f1c40f;
        }

        .nav-links a.active {
            color: #f1c40f;
            border-bottom-color: #f1c40f;
        }

        @media (max-width: 650px) {
            .nav {
                flex-direction: column;
                gap: 0.6rem;
                padding: 1rem 1.5rem;
                border-radius: 28px;
            }
            .nav-links {
                gap: 1.2rem;
                flex-wrap: wrap;
                justify-content: center;
            }
            .nav-links a {
                font-size: 0.9rem;
            }
        }

        @media (max-width: 400px) {
            .nav {
                border-radius: 20px;
                padding: 0.8rem 1rem;
            }
            .nav-brand {
                font-size: 1.3rem;
            }
            .nav-links {
                gap: 0.8rem;
            }
        }
    </style>
</head>
<body>

    <nav class="nav">
        <a href="#" class="nav-brand">✦ <span>Nova</span>Studio</a>
        <ul class="nav-links">
            <li><a href="#" class="active">Home</a></li>
            <li><a href="#">Portfolio</a></li>
            <li><a href="#">Blog</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <div style="max-width:1100px; margin:2rem auto 0; text-align:center; color:#7f8c8d; font-size:1.1rem;">
        <p>Resize the browser to see the nav bar adapt.</p>
    </div>

</body>
</html>
